<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Throne Telemetry</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            padding: 30px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
        h1 { color: #333; font-size: 2.2em; }
        .actions { display: flex; gap: 10px; }
        a, button {
            border: none;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 18px;
            border-left: 5px solid #667eea;
        }
        .card-label { color: #666; font-size: 14px; margin-bottom: 8px; }
        .card-value { color: #333; font-size: 32px; font-weight: 700; }
        .section-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        .panel {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 18px;
        }
        .panel h2 { margin-bottom: 12px; color: #333; font-size: 20px; }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            text-align: left;
            padding: 10px 8px;
            border-bottom: 1px solid #ddd;
        }
        th { color: #555; }
        .status {
            margin-top: 20px;
            color: #666;
            font-size: 13px;
        }
        .empty { color: #888; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📈 Telemetry Dashboard</h1>
            <div class="actions">
                <button type="button" onclick="loadTelemetry()">Refresh</button>
                <a href="/">Back to Calculator</a>
            </div>
        </div>

        <div class="cards">
            <div class="card"><div class="card-label">Total Visits</div><div class="card-value" id="totalVisits">—</div></div>
            <div class="card"><div class="card-label">Unique Visitors</div><div class="card-value" id="uniqueVisitors">—</div></div>
            <div class="card"><div class="card-label">Total Operations</div><div class="card-value" id="totalOperations">—</div></div>
            <div class="card"><div class="card-label">Last Updated (UTC)</div><div class="card-value" id="lastUpdated" style="font-size: 18px;">—</div></div>
        </div>

        <div class="section-grid">
            <div class="panel">
                <h2>Operations</h2>
                <div id="operationsTable"></div>
            </div>
            <div class="panel">
                <h2>Hero Usage</h2>
                <div id="heroUsageTable"></div>
            </div>
            <div class="panel">
                <h2>Page Visits</h2>
                <div id="pageVisitsTable"></div>
            </div>
        </div>

        <div class="status" id="status">Loading telemetry…</div>
    </div>

    <script>
        const visitorStorageKey = 'dice-throne-visitor-id';

        function getVisitorId() {
            let visitorId = localStorage.getItem(visitorStorageKey);
            if (!visitorId) {
                visitorId = window.crypto?.randomUUID?.() || `visitor-${Date.now()}-${Math.random().toString(16).slice(2)}`;
                localStorage.setItem(visitorStorageKey, visitorId);
            }

            return visitorId;
        }

        async function apiFetch(url, options = {}) {
            const headers = new Headers(options.headers || {});
            headers.set('X-Visitor-Id', getVisitorId());
            return fetch(url, { ...options, headers });
        }

        async function trackVisit(page) {
            try {
                await apiFetch('/api/telemetry/visit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ visitorId: getVisitorId(), page })
                });
            } catch (error) {
                console.error('Error recording visit:', error);
            }
        }

        function renderTable(containerId, rows, keyLabel) {
            const container = document.getElementById(containerId);
            if (!rows.length) {
                container.innerHTML = '<div class="empty">No data yet.</div>';
                return;
            }

            container.innerHTML = `
                <table>
                    <thead><tr><th>${keyLabel}</th><th>Count</th></tr></thead>
                    <tbody>
                        ${rows.map(([key, value]) => `<tr><td>${key}</td><td>${value}</td></tr>`).join('')}
                    </tbody>
                </table>`;
        }

        function sortEntries(record) {
            return Object.entries(record || {}).sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));
        }

        async function loadTelemetry() {
            const status = document.getElementById('status');
            status.textContent = 'Loading telemetry…';

            try {
                const response = await apiFetch('/api/telemetry');
                const telemetry = await response.json();

                document.getElementById('totalVisits').textContent = telemetry.totalVisits;
                document.getElementById('uniqueVisitors').textContent = telemetry.uniqueVisitors;
                document.getElementById('totalOperations').textContent = telemetry.totalOperations;
                document.getElementById('lastUpdated').textContent = telemetry.lastUpdatedUtc
                    ? new Date(telemetry.lastUpdatedUtc).toLocaleString()
                    : '—';

                renderTable('operationsTable', sortEntries(telemetry.operationCounts), 'Operation');
                renderTable('heroUsageTable', sortEntries(telemetry.heroUsage), 'Hero');
                renderTable('pageVisitsTable', sortEntries(telemetry.pageVisits), 'Page');
                status.textContent = 'Telemetry loaded successfully.';
            } catch (error) {
                console.error('Error loading telemetry:', error);
                status.textContent = 'Failed to load telemetry.';
            }
        }

        trackVisit('telemetry').finally(loadTelemetry);
    </script>
</body>
</html>

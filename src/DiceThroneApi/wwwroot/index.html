<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Throne Roll Calculator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            padding: 30px;
        }
        
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
        }
        
        label {
            font-weight: 600;
            margin-bottom: 5px;
            color: #555;
        }
        
        select, input {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        button {
            flex: 1;
            padding: 12px 15px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }
        
        button .btn-subtitle {
            font-size: 11px;
            font-weight: 400;
            opacity: 0.85;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
        }
        
        .btn-secondary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .status {
            text-align: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 600;
            font-size: 18px;
        }
        
        .dice-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .die {
            width: 80px;
            height: 80px;
            background: white;
            border: 3px solid #667eea;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            user-select: none;
        }
        
        .die:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .die.keep {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #764ba2;
        }
        
        .die.reroll {
            background: #f8f9fa;
            color: #999;
            border-color: #ddd;
        }

        .die.manifest {
            background: linear-gradient(135deg, #1e88e5 0%, #1565c0 100%);
            color: white;
            border-color: #0d47a1;
            cursor: not-allowed;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 2px;
            line-height: 1;
            font-size: 28px;
        }

        .die.manifest:hover {
            transform: none;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .manifest-tag {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.4px;
            text-transform: uppercase;
        }
        
        .objectives {
            margin-top: 30px;
        }
        
        .objective-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 5px solid #667eea;
            transition: all 0.3s;
        }
        
        .objective-card:hover {
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transform: translateX(5px);
        }
        
        .objective-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .objective-name {
            font-weight: 600;
            font-size: 18px;
            color: #333;
        }
        
        .objective-notation {
            font-size: 13px;
            font-weight: 400;
            color: #777;
            margin-left: 8px;
        }
        
        .probability {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        
        .probability-hit {
            font-size: 28px;
            font-weight: bold;
            color: #2e7d32;
        }
        
        .probability-miss {
            font-size: 28px;
            font-weight: bold;
            color: #c62828;
        }
        
        .objective-meta {
            display: flex;
            gap: 20px;
            margin-top: 6px;
            font-size: 13px;
            color: #666;
        }
        
        .expected-damage {
            font-weight: 600;
            color: #e05c00;
        }
        
        .fallback-info {
            margin-top: 10px;
            padding: 8px 12px;
            background: #fff8e1;
            border-left: 3px solid #f9a825;
            border-radius: 4px;
            font-size: 13px;
            color: #555;
        }
        
        .fallback-info strong {
            color: #e65100;
        }
        
        .keep-suggestion {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        .suggestion-die {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
        }
        
        .suggestion-die.keep {
            background: #667eea;
            color: white;
        }
        
        .suggestion-die.reroll {
            background: #e0e0e0;
            color: #999;
        }

        .suggestion-die.manifest {
            background: #1565c0;
            color: white;
            border: 2px solid #0d47a1;
            font-size: 13px;
            line-height: 1.1;
            padding-top: 2px;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
            font-weight: 600;
        }
        
        .dice-hint {
            text-align: center;
            font-size: 13px;
            color: #777;
            margin-bottom: 20px;
        }
        
        .error {
            background: #fee;
            border: 2px solid #f88;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            color: #c00;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎲 Dice Throne Roll Calculator</h1>
        
        <div class="controls">
            <div class="control-group">
                <label for="heroSelect">Select Hero:</label>
                <select id="heroSelect">
                    <option value="">Loading heroes...</option>
                </select>
            </div>
            
            <div class="control-group">
                <label for="diceCount">Number of Dice:</label>
                <select id="diceCount">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5" selected>5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                </select>
            </div>
            <div class="control-group">
                <label for="diceValuesInput">Set Dice Values (comma-separated):</label>
                <input id="diceValuesInput" type="text" placeholder="e.g. 1,2,3,4,5" />
            </div>
            
            <div class="control-group">
                <label for="methodSelect">Calculation Method:</label>
                <select id="methodSelect">
                    <option value="analytic">Analytic</option>
                    <option value="montecarlo">Monte Carlo</option>
                </select>
            </div>
        </div>
        
        <div class="button-group">
            <button class="btn-primary" id="rollBtn" onclick="rollDice()">
                🎲 Roll Dice
                <span class="btn-subtitle">Start a new turn — rolls all dice fresh</span>
            </button>
            <button class="btn-secondary" id="preRollBtn" onclick="calculateObjectiveOdds()">
                📊 Show Objective Odds
                <span class="btn-subtitle">See each objective's chance before rolling</span>
            </button>
            <button class="btn-secondary" id="rerollBtn" onclick="rerollDice()" disabled>
                🔄 Re-roll Unselected
                <span class="btn-subtitle">Re-rolls gray dice, keeps highlighted dice</span>
            </button>
            <button class="btn-secondary" id="setDiceBtn" onclick="setDiceValues()" disabled>
                🛠️ Set Dice & Recalculate
                <span class="btn-subtitle">Apply manual values and refresh advice</span>
            </button>
        </div>
        
        <div id="status" class="status">Click "Roll Dice" to start a new turn!</div>
        
        <div id="diceContainer" class="dice-container"></div>
        <div id="diceHint" class="dice-hint" style="display:none;">
            🔵 Highlighted = keep &nbsp;|&nbsp; ⬜ Gray = re-roll &nbsp;·&nbsp; Click any die to toggle
        </div>
        
        <div id="objectives" class="objectives"></div>
    </div>

    <script>
        let currentHero = null;
        let currentDice = [];
        let rollsRemaining = 2;
        let diceToKeep = [];
        let hasManifestDie = false;
        let manifestDieIndex = -1;
        let isBusy = false;
        const defaultStatusText = 'Click "Roll Dice" to start a new turn!';
        const preRollStatusText = 'Pre-roll objective odds — click "Roll Dice" to start a new turn.';
        
        async function loadHeroes() {
            try {
                const response = await fetch('/api/heroes');
                const heroes = await response.json();
                
                const select = document.getElementById('heroSelect');
                select.innerHTML = heroes.map(hero => 
                    `<option value="${hero.id}">${hero.name}</option>`
                ).join('');
                
                if (heroes.length > 0) {
                    await loadHero(heroes[0].id);
                }
            } catch (error) {
                console.error('Error loading heroes:', error);
                document.getElementById('heroSelect').innerHTML = '<option>Error loading heroes</option>';
            }
        }
        
        async function loadHero(heroId) {
            try {
                const response = await fetch(`/api/heroes/${heroId}`);
                currentHero = await response.json();
                hasManifestDie = currentHero?.id?.toLowerCase() === 'psylocke';
                manifestDieIndex = hasManifestDie ? 0 : -1;
                resetTurnDisplay(defaultStatusText);
            } catch (error) {
                console.error('Error loading hero:', error);
            }

            updateActionButtons();
        }
        
        document.getElementById('heroSelect').addEventListener('change', (e) => {
            loadHero(e.target.value);
        });

        function updateActionButtons() {
            document.getElementById('rollBtn').disabled = isBusy || !currentHero;
            document.getElementById('preRollBtn').disabled = isBusy || !currentHero;
            document.getElementById('rerollBtn').disabled = isBusy || rollsRemaining <= 0 || currentDice.length === 0;
            document.getElementById('setDiceBtn').disabled = isBusy || !currentHero;
        }

        function clearDiceDisplay() {
            currentDice = [];
            diceToKeep = [];
            rollsRemaining = 2;
            document.getElementById('diceContainer').innerHTML = '';
            document.getElementById('diceHint').style.display = 'none';
        }

        function resetTurnDisplay(statusText) {
            clearDiceDisplay();
            document.getElementById('status').textContent = statusText;
            document.getElementById('objectives').innerHTML = '';
        }

        function renderObjectives(suggestions, showKeepSuggestions = true) {
            const objectivesDiv = document.getElementById('objectives');
            objectivesDiv.innerHTML = suggestions.map(advice => {
                const percentage = (advice.probability * 100).toFixed(1);
                const notationHtml = advice.objectiveNotation
                    ? `<span class="objective-notation">${advice.objectiveNotation}</span>`
                    : '';
                let probabilityHtml;
                if (rollsRemaining === 0) {
                    if (advice.probability >= 1.0) {
                        probabilityHtml = `<span class="probability-hit">✓</span>`;
                    } else if (advice.probability <= 0.0) {
                        probabilityHtml = `<span class="probability-miss">✗</span>`;
                    } else {
                        probabilityHtml = `<span class="probability">${percentage}%</span>`;
                    }
                } else {
                    probabilityHtml = `<span class="probability">${percentage}%</span>`;
                }
                const damageInfo = advice.damage > 0
                    ? `<span>Damage: <strong>${advice.damage}</strong></span>
                       <span class="expected-damage">Expected: ${advice.expectedDamage.toFixed(2)} dmg</span>`
                    : '';
                const fallbackInfo = showKeepSuggestions && advice.probability < 0.9 && advice.fallbackObjectiveName && advice.fallbackExpectedDamage > 0
                    ? `<div class="fallback-info">↩ Fallback: <strong>${advice.fallbackObjectiveName}</strong> — ${(advice.fallbackProbability * 100).toFixed(1)}% chance (${advice.fallbackExpectedDamage.toFixed(2)} expected dmg)</div>`
                    : '';
                const keepSuggestion = showKeepSuggestions
                    ? `<div>Suggested keep:</div>
                       <div class="keep-suggestion">
                           ${currentDice.map((value, i) => 
                               isManifestDie(i)
                                   ? `<div class="suggestion-die manifest">${value}<br>MAN</div>`
                                   : `<div class="suggestion-die ${advice.diceToKeep[i] ? 'keep' : 'reroll'}">${value}</div>`
                           ).join('')}
                       </div>`
                    : '';

                return `
                    <div class="objective-card">
                        <div class="objective-header">
                            <span class="objective-name">${advice.objectiveName}${notationHtml}</span>
                            ${probabilityHtml}
                        </div>
                        <div class="objective-meta">${damageInfo}</div>
                        ${fallbackInfo}
                        ${keepSuggestion}
                    </div>
                `;
            }).join('');
        }
        
        async function rollDice() {
            if (!currentHero || isBusy) return;

            isBusy = true;
            updateActionButtons();
            
            const diceCount = parseInt(document.getElementById('diceCount').value);
            const method = document.getElementById('methodSelect').value;
            
            clearDiceDisplay();
            document.getElementById('status').textContent = 'Rolling dice...';
            document.getElementById('objectives').innerHTML = '<div class="loading">Calculating probabilities...</div>';
            
            try {
                const response = await fetch('/api/roll/simulate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        heroId: currentHero.id,
                        diceCount: diceCount,
                        method: method
                    })
                });
                
                const result = await response.json();
                currentDice = result.dice.slice();
                rollsRemaining = result.rollsRemaining;
                hasManifestDie = !!result.hasManifestDie;
                manifestDieIndex = hasManifestDie ? result.manifestDieIndex : -1;
                diceToKeep = new Array(currentDice.length).fill(true);
                if (hasManifestDie && manifestDieIndex >= 0 && manifestDieIndex < diceToKeep.length) {
                    diceToKeep[manifestDieIndex] = true;
                }
                
                updateDisplay(result.suggestions);
            } catch (error) {
                console.error('Error rolling dice:', error);
                document.getElementById('objectives').innerHTML = '<div class="error">Error calculating probabilities</div>';
            } finally {
                isBusy = false;
                updateActionButtons();
            }
        }

        async function calculateObjectiveOdds() {
            if (!currentHero || isBusy) return;

            isBusy = true;
            updateActionButtons();

            const diceCount = parseInt(document.getElementById('diceCount').value);
            const method = document.getElementById('methodSelect').value;

            clearDiceDisplay();
            document.getElementById('status').textContent = 'Calculating pre-roll objective odds...';
            document.getElementById('objectives').innerHTML = '<div class="loading">Calculating objective odds...</div>';

            try {
                const response = await fetch('/api/roll/preroll', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        heroId: currentHero.id,
                        diceCount: diceCount,
                        method: method
                    })
                });

                const suggestions = await response.json();
                document.getElementById('status').textContent = preRollStatusText;
                renderObjectives(suggestions, false);
            } catch (error) {
                console.error('Error calculating objective odds:', error);
                document.getElementById('objectives').innerHTML = '<div class="error">Error calculating objective odds</div>';
            } finally {
                isBusy = false;
                updateActionButtons();
            }
        }
        
        async function rerollDice() {
            if (!currentHero || rollsRemaining <= 0 || isBusy) return;

            const rerollIndexes = [];
            for (let i = 0; i < currentDice.length; i++) {
                if (isManifestDie(i)) {
                    continue;
                }

                if (!diceToKeep[i]) {
                    rerollIndexes.push(i);
                }
            }

            const rerollCount = rerollIndexes.length;
            
            if (rerollCount === 0) {
                alert('Please select at least one die to re-roll!');
                return;
            }

            isBusy = true;
            updateActionButtons();
            
            const newRolls = Array.from({length: rerollCount}, () => Math.floor(Math.random() * 6) + 1);
            const nextDice = currentDice.slice();
            rerollIndexes.forEach((dieIndex, rerollIndex) => {
                nextDice[dieIndex] = newRolls[rerollIndex];
            });
            currentDice = nextDice;
            rollsRemaining--;
            
            const method = document.getElementById('methodSelect').value;
            
            document.getElementById('objectives').innerHTML = '<div class="loading">Calculating probabilities...</div>';
            
            try {
                const response = await fetch('/api/roll/advice', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        heroId: currentHero.id,
                        currentDice: currentDice,
                        rollsRemaining: rollsRemaining,
                        method: method
                    })
                });
                
                const suggestions = await response.json();
                diceToKeep = new Array(currentDice.length).fill(true);
                if (hasManifestDie && manifestDieIndex >= 0 && manifestDieIndex < diceToKeep.length) {
                    diceToKeep[manifestDieIndex] = true;
                }
                
                updateDisplay(suggestions);
            } catch (error) {
                console.error('Error getting advice:', error);
                document.getElementById('objectives').innerHTML = '<div class="error">Error calculating probabilities</div>';
            } finally {
                isBusy = false;
                updateActionButtons();
            }
        }

        async function setDiceValues() {
            if (!currentHero || isBusy) return;

            const raw = document.getElementById('diceValuesInput').value.trim();
            if (!raw) {
                alert('Please enter dice values before setting.');
                return;
            }

            const values = raw
                .split(',')
                .map(v => parseInt(v.trim(), 10))
                .filter(v => !Number.isNaN(v));

            const expectedCount = parseInt(document.getElementById('diceCount').value, 10);

            if (values.length !== expectedCount) {
                alert(`Expected ${expectedCount} dice values, got ${values.length}.`);
                return;
            }

            if (!values.every(v => v >= 1 && v <= 6)) {
                alert('Dice values must be integers between 1 and 6.');
                return;
            }

            currentDice = values;
            diceToKeep = new Array(currentDice.length).fill(true);
            if (hasManifestDie && manifestDieIndex >= 0 && manifestDieIndex < diceToKeep.length) {
                diceToKeep[manifestDieIndex] = true;
            }

            document.getElementById('status').textContent = 'Manual dice values set. Calculating probabilities...';
            document.getElementById('objectives').innerHTML = '<div class="loading">Calculating probabilities...</div>';

            try {
                const response = await fetch('/api/roll/setdice', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        heroId: currentHero.id,
                        currentDice: currentDice,
                        rollsRemaining: rollsRemaining,
                        method: document.getElementById('methodSelect').value
                    })
                });

                const result = await response.json();
                currentDice = result.dice.slice();
                rollsRemaining = result.rollsRemaining;
                hasManifestDie = !!result.hasManifestDie;
                manifestDieIndex = hasManifestDie ? result.manifestDieIndex : -1;

                updateDisplay(result.suggestions);
            } catch (error) {
                console.error('Error setting dice values:', error);
                document.getElementById('objectives').innerHTML = '<div class="error">Error calculating probabilities</div>';
            } finally {
                updateActionButtons();
            }
        }
        
        function updateDisplay(suggestions) {
            document.getElementById('status').textContent = 
                rollsRemaining > 0
                    ? `Rolls Remaining: ${rollsRemaining}`
                    : `No re-rolls left`;
            
            document.getElementById('diceHint').style.display = 'block';
            document.getElementById('diceHint').textContent = hasManifestDie
                ? '🔵 Highlighted = keep | ⬜ Gray = re-roll | 🧿 Manifest Die (first die) is locked for Psylocke'
                : '🔵 Highlighted = keep | ⬜ Gray = re-roll · Click any die to toggle';
            
            const diceContainer = document.getElementById('diceContainer');
            diceContainer.innerHTML = currentDice.map((value, index) => 
                isManifestDie(index)
                    ? `<div class="die manifest" title="Manifest Die (locked)"><span>${value}</span><span class="manifest-tag">Manifest</span></div>`
                    : `<div class="die ${diceToKeep[index] ? 'keep' : 'reroll'}" onclick="toggleDie(${index})">${value}</div>`
            ).join('');
            
            renderObjectives(suggestions);
            updateActionButtons();
        }
        
        function toggleDie(index) {
            if (isManifestDie(index)) {
                return;
            }

            diceToKeep[index] = !diceToKeep[index];
            const diceElements = document.querySelectorAll('.die');
            diceElements[index].className = `die ${diceToKeep[index] ? 'keep' : 'reroll'}`;
        }

        function isManifestDie(index) {
            return hasManifestDie && index === manifestDieIndex;
        }
        
        updateActionButtons();
        loadHeroes();
    </script>
</body>
</html>
